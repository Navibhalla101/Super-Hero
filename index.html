<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super-Hero Concept Catalog</title>
  <style>
    :root {
      --bg: #1b1b1a;
      --bg-deep: #111211;
      --cream: #fff8e8;
      --paper: #f6efdc;
      --gray: #cfcfc9;
      --navy: #102235;
      --tan: #dca66d;
      --cyan: #23d9e8;
      --ink: #161616;
      --muted: rgba(255,248,232,0.72);
      --line: rgba(255,248,232,0.28);
      --line-strong: rgba(255,248,232,0.52);
      --shadow: 0 26px 70px rgba(0,0,0,0.42);
      --serif: Georgia, "Times New Roman", serif;
      --mono: "Courier New", Courier, monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--cream);
      background:
        radial-gradient(circle at 15% 15%, rgba(255,248,232,0.05), transparent 34rem),
        radial-gradient(circle at 85% 20%, rgba(35,217,232,0.055), transparent 24rem),
        linear-gradient(135deg, var(--bg), var(--bg-deep));
      font-family: var(--sans);
    }

    .catalog-shell {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 34px 0 90px;
      position: relative;
    }

    .catalog-shell::before,
    .catalog-shell::after {
      content: "";
      position: fixed;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(35,217,232,0.25);
      pointer-events: none;
      z-index: 0;
    }

    .catalog-shell::before {
      right: 5vw;
      top: 72px;
    }

    .catalog-shell::after {
      right: 43vw;
      top: 40vh;
      transform: rotate(4deg);
    }

    .catalog-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
      gap: 58px;
      align-items: center;
      min-height: 560px;
      position: relative;
      z-index: 1;
    }

    .kicker {
      color: var(--tan);
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      margin-bottom: 26px;
    }

    .catalog-title {
      font-family: var(--serif);
      font-weight: 400;
      line-height: 0.93;
      letter-spacing: -0.055em;
      font-size: clamp(4.1rem, 9.4vw, 8.9rem);
      margin: 0;
      max-width: 680px;
    }

    .catalog-title--compact {
      font-size: clamp(3.4rem, 7vw, 6.4rem);
      margin-top: 10px;
    }

    .catalog-title .cyan {
      color: var(--cyan);
      display: block;
    }

    .catalog-copy {
      width: min(430px, 100%);
      margin: 32px 0 34px;
      color: rgba(255,248,232,0.82);
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.72;
    }

    .outline-button {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: min(530px, 100%);
      border: 1px solid rgba(255,248,232,0.45);
      background: transparent;
      color: var(--cream);
      padding: 18px 24px;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .outline-button:hover,
    .outline-button:focus-visible {
      color: var(--cyan);
      border-color: var(--cyan);
      transform: translateY(-1px);
      outline: none;
    }

    .palette-stack {
      width: min(420px, 100%);
      margin-left: auto;
      transform: rotate(-4deg);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .swatch {
      min-height: 126px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.26);
    }

    .swatch.gray { background: linear-gradient(145deg, #e2e2df, #bdbdb8); }
    .swatch.navy { background: linear-gradient(145deg, #18334d, #0b1725); }
    .swatch.tan { background: linear-gradient(145deg, #efc18d, #cf8f55); }
    .swatch.cyan { background: linear-gradient(145deg, #4ceeff, #12ccd7); }

    .year-card {
      grid-column: 1 / -1;
      min-height: 134px;
      background: radial-gradient(circle at 50% 50%, #fffdf5, var(--paper));
      color: var(--ink);
      display: grid;
      place-items: center;
      font-family: var(--serif);
      letter-spacing: 0.34em;
      font-size: 1rem;
      box-shadow: 0 24px 48px rgba(0,0,0,0.3);
      margin-top: 8px;
    }

    .section-intro {
      display: flex;
      justify-content: space-between;
      gap: 32px;
      align-items: end;
      border-top: 1px solid rgba(255,248,232,0.22);
      padding-top: 28px;
      margin: 0 0 34px;
      position: relative;
      z-index: 1;
    }

    .section-intro h2 {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 5vw, 4.9rem);
      line-height: 0.95;
      font-weight: 400;
      letter-spacing: -0.055em;
      margin: 0;
    }

    .section-intro p {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.65;
      margin: 0;
      max-width: 430px;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 26px;
      position: relative;
      z-index: 1;
    }

    .hero-card {
      border-top: 1px solid rgba(255,248,232,0.35);
      padding-top: 16px;
    }

    .hero-card:nth-child(even) .portrait-panel { transform: rotate(2deg); }
    .hero-card:nth-child(odd) .portrait-panel { transform: rotate(-2deg); }
    .hero-card:nth-child(3n) .portrait-panel { transform: rotate(1deg); }

    .portrait-panel {
      position: relative;
      min-height: 350px;
      cursor: pointer;
      overflow: visible;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      transition: transform 190ms ease, filter 190ms ease;
    }

    .portrait-panel:hover {
      filter: brightness(1.035);
    }

    .portrait-panel:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 6px;
    }

    .portrait-panel::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,0.22);
      pointer-events: none;
    }

    .placeholder-label {
      position: absolute;
      left: 20px;
      top: 20px;
      z-index: 3;
      color: rgba(255,248,232,0.82);
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,248,232,0.26);
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.19em;
      text-transform: uppercase;
    }

    .figure {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 44%;
      height: 82%;
      transform: translateX(-50%);
      filter: drop-shadow(0 24px 26px rgba(0,0,0,0.38));
    }

    .figure__head {
      position: absolute;
      left: 50%;
      top: 3%;
      width: 31%;
      aspect-ratio: 1;
      transform: translateX(-50%);
      border-radius: 50%;
      background: var(--cream);
      box-shadow: inset -12px -8px 0 rgba(0,0,0,0.12);
    }

    .figure__body {
      position: absolute;
      left: 50%;
      top: 27%;
      width: 72%;
      height: 56%;
      transform: translateX(-50%);
      border-radius: 46% 46% 12% 12%;
      background: linear-gradient(145deg, var(--suit-light), var(--suit-dark));
    }

    .figure__body::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 18%;
      height: 100%;
      transform: translateX(-50%);
      background: rgba(255,248,232,0.38);
      mix-blend-mode: screen;
    }

    .figure__arm,
    .figure__leg {
      position: absolute;
      background: linear-gradient(145deg, var(--suit-light), var(--suit-dark));
      border-radius: 999px;
    }

    .figure__arm.left {
      width: 18%;
      height: 45%;
      left: 5%;
      top: 32%;
      transform: rotate(9deg);
    }

    .figure__arm.right {
      width: 18%;
      height: 45%;
      right: 5%;
      top: 32%;
      transform: rotate(-9deg);
    }

    .figure__leg.left {
      width: 22%;
      height: 38%;
      left: 27%;
      bottom: 0;
    }

    .figure__leg.right {
      width: 22%;
      height: 38%;
      right: 27%;
      bottom: 0;
    }

    .costume-node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 8;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid var(--cream);
      background: var(--cyan);
      box-shadow: 0 0 0 7px rgba(35,217,232,0.18), 0 12px 26px rgba(0,0,0,0.42);
      cursor: help;
    }

    .costume-node::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
    }

    .costume-node::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 16px);
      width: min(250px, 70vw);
      transform: translateX(-50%) translateY(6px);
      padding: 13px 14px;
      color: var(--ink);
      background: var(--cream);
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 0 18px 34px rgba(0,0,0,0.34);
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.48;
      letter-spacing: 0.02em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 170ms ease, transform 170ms ease;
    }

    .costume-node:hover::after,
    .costume-node:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .costume-node:focus-visible {
      outline: 2px solid var(--cream);
      outline-offset: 5px;
    }

    .card-caption {
      padding: 20px 0 0;
    }

    .card-caption h3 {
      margin: 0;
      color: var(--cream);
      font-family: var(--serif);
      font-size: 2.15rem;
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.045em;
    }

    .card-caption p {
      margin: 10px 0 16px;
      color: rgba(255,248,232,0.72);
      font-family: var(--mono);
      font-size: 0.77rem;
      line-height: 1.65;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      border: 1px solid rgba(255,248,232,0.32);
      color: rgba(255,248,232,0.86);
      padding: 6px 9px;
      font-family: var(--mono);
      font-size: 0.63rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .open-file {
      width: 100%;
      border: 1px solid rgba(255,248,232,0.45);
      background: transparent;
      color: var(--cream);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 13px 14px;
      cursor: pointer;
      transition: color 180ms ease, border-color 180ms ease;
    }

    .open-file:hover,
    .open-file:focus-visible {
      color: var(--cyan);
      border-color: var(--cyan);
      outline: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 26px;
      background: rgba(10,10,10,0.78);
      backdrop-filter: blur(9px);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 210ms ease, visibility 0s linear 210ms;
    }

    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transition: none;
    }

    .modal-backdrop.is-closing {
      opacity: 1;
      pointer-events: none;
      visibility: visible;
      transition: none;
    }

    .modal {
      width: min(970px, 100%);
      max-height: min(88vh, 900px);
      overflow: auto;
      background: var(--cream);
      color: var(--ink);
      box-shadow: 0 36px 90px rgba(0,0,0,0.58);
      transform: rotate(-1deg) scale(0.72);
      border: 1px solid rgba(255,248,232,0.5);
      opacity: 1;
      transform-origin: center center;
    }

    .modal-backdrop.is-open:not(.is-closing) .modal {
      animation: modalExpand 230ms cubic-bezier(.2,.9,.2,1.15) forwards;
    }

    @keyframes modalExpand {
      from {
        opacity: 1;
        transform: rotate(-1deg) scale(0.72);
      }
      to {
        opacity: 1;
        transform: rotate(-1deg) scale(1);
      }
    }

    @keyframes modalCollapse {
      from {
        opacity: 1;
        transform: rotate(-1deg) scale(1);
      }
      to {
        opacity: 1;
        transform: rotate(-1deg) scale(0.72);
      }
    }

    .modal-backdrop.is-closing .modal {
      animation: modalCollapse 230ms cubic-bezier(.8,-.15,.8,.1) forwards;
    }

    .modal-close {
      position: sticky;
      top: 14px;
      float: right;
      z-index: 3;
      margin: 14px 14px 0 0;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(0,0,0,0.25);
      background: rgba(255,248,232,0.76);
      color: var(--ink);
      font-size: 1.45rem;
      cursor: pointer;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 28px;
      padding: 34px;
      clear: both;
    }

    .modal-portrait {
      position: relative;
      min-height: 420px;
      background: var(--card-bg);
      box-shadow: 0 22px 42px rgba(0,0,0,0.22);
    }

    .modal-portrait::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,0.24);
    }

    .modal-portrait .figure {
      width: 48%;
      height: 82%;
    }

    .modal-portrait .costume-node::after {
      z-index: 12;
    }

    .modal-copy .kicker {
      color: #9a6c3e;
      margin-bottom: 18px;
    }

    .modal-copy h2 {
      font-family: var(--serif);
      font-size: clamp(3.6rem, 7vw, 6.2rem);
      line-height: 0.88;
      font-weight: 400;
      letter-spacing: -0.065em;
      margin: 0 0 20px;
      color: var(--ink);
    }

    .modal-summary {
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.7;
      color: rgba(0,0,0,0.72);
      max-width: 590px;
      margin: 0 0 22px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 0 0 18px;
    }

    .info-card {
      border: 1px solid rgba(0,0,0,0.18);
      padding: 14px;
      background: rgba(255,255,255,0.4);
    }

    .info-card span,
    .section-box h3 {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: #9a6c3e;
      margin-bottom: 8px;
    }

    .info-card strong {
      font-size: 0.91rem;
      line-height: 1.42;
    }

    .section-box {
      border-top: 1px solid rgba(0,0,0,0.18);
      padding-top: 16px;
      margin-top: 18px;
    }

    .section-box p,
    .section-box li {
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.72;
      color: rgba(0,0,0,0.76);
    }

    .section-box p { margin: 0; }
    .section-box ul { margin: 0; padding-left: 1.15rem; }

    .modal-note {
      margin-top: 18px;
      border: 1px solid rgba(35,217,232,0.5);
      color: rgba(0,0,0,0.72);
      padding: 12px 13px;
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .catalog-hero,
      .modal-grid {
        grid-template-columns: 1fr;
      }

      .palette-stack {
        margin: 12px 0 0;
      }

      .catalog-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .catalog-shell {
        width: min(100% - 22px, 1180px);
        padding-top: 36px;
      }

      .catalog-hero {
        min-height: unset;
        gap: 40px;
      }

      .catalog-grid,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .section-intro {
        display: block;
      }

      .section-intro p {
        margin-top: 18px;
      }

      .palette-stack {
        gap: 10px;
      }

      .swatch { min-height: 100px; }
      .year-card { min-height: 108px; }
      .portrait-panel { min-height: 320px; }

      .modal-backdrop { padding: 10px; }
      .modal { transform: none; }
      .modal-grid { padding: 22px; }
      .modal-portrait { min-height: 340px; }
    }
  </style>
</head>
<body>
  <main class="catalog-shell">
    <section class="section-intro" id="selected-work">
      <div>
        <div class="kicker">Character design archive — six concepts</div>
        <h1 class="catalog-title catalog-title--compact">Super-Hero <span class="cyan">Concepts</span></h1>
      </div>
      <p>Click a figure panel to open that character’s file. Costume notes appear as hoverable nodes only inside the expanded character window.</p>
    </section>

    <section class="catalog-grid" id="catalogGrid" aria-label="Superhero character catalog"></section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <article class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close character details">×</button>
      <div id="modalInner"></div>
    </article>
  </div>

  <script>
    const heroes = [
      {
        name: "Ghost Radar",
        role: "Urban rescuer / Street-Level tactician",
        short: "A dark brooding hero who turns city infrastructure into a living rescue network.",
        origin: "After surviving a blackout caused by a corrupt privatized power grid, she learned to hear distress signals through electrical noise and rebuilt herself into a protector of overlooked neighborhoods.",
        powers: ["Reads and redirects electrical signals", "Creates short-range hard-light rescue beacons", "Maps outages, panic, and emergency calls through the city grid"],
        process: "This character is built around the idea that superhero power can come from civic infrastructure instead of cosmic destiny. Her worldbuilding pulls from real anxieties around failing power grids, underfunded emergency systems, surveillance, and uneven urban investment. The costume combines saintly iconography with utility-worker practicality, making her feel half-mythic and half-public-service technician.",
        tags: ["Electric", "Civic", "Rescue"],
        cardBg: "linear-gradient(145deg, #cfcfc9, #102235)",
        suitLight: "#23d9e8",
        suitDark: "#102235",
        nodes: [
          { x: "50%", y: "26%", tip: "Halo-like collar: frames her head as a rescue beacon, connecting emergency lights with saint imagery." },
          { x: "43%", y: "52%", tip: "Circuit-like suit lines: shows that she is plugged into the city without turning her into generic tech armor." },
          { x: "61%", y: "73%", tip: "Reinforced boots: points toward utility work, rooftops, and field rescue instead of clean superhero pageantry." }
        ]
      },
      {
        name: "The Switch",
        role: "Night patrol illusionist",
        short: "A quiet hero who weaponizes glare, shadow, and misdirection.",
        origin: "A projection designer exposed to experimental stage-light particles became able to bend low light into decoys, veils, and blinding flashes.",
        powers: ["Creates light-decoy duplicates", "Dulls sound and visibility inside shadow fields", "Flash-disorients enemies for brief windows"],
        process: "Mothlight came from thinking about stagecraft as a superpower: not invisibility exactly, but control over where the audience looks. Their world takes inspiration from theater lighting, nightlife, moth camouflage, and cities where people disappear into crowds after dark. The costume is intentionally soft and layered instead of armored, because the character survives by blur, not brute force.",
        tags: ["Illusion", "Stealth", "Theater"],
        cardBg: "linear-gradient(145deg, #102235, #1b1b1a)",
        suitLight: "#cfcfc9",
        suitDark: "#102235",
        nodes: [
          { x: "50%", y: "25%", tip: "Hooded silhouette: creates a moth-wing shape around the face, making the figure feel hidden even in full view." },
          { x: "36%", y: "49%", tip: "Loose panels: behave like stage curtains, turning reveal and concealment into part of the costume." },
          { x: "63%", y: "58%", tip: "Muted navy-gray palette: keeps the design nocturnal without relying on plain black stealth clichés." }
        ]
      },
      {
        name: "Helix-3",
        role: "Coastal defender / flood-zone guardian",
        short: "A water-force hero who fights like a living seawall.",
        origin: "When a storm surge destroyed his neighborhood, he bonded with an experimental ocean-monitoring device that lets him redirect pressure, current, and impact.",
        powers: ["Controls water pressure and current", "Forms kinetic shields from moisture", "Senses storms, tides, and structural flooding"],
        process: "This concept treats climate disaster as the origin event rather than background scenery. Tidebreaker’s worldbuilding draws from coastal cities, flood maps, seawalls, insurance abandonment, and communities forced to adapt faster than governments do. His costume uses wetsuit logic because he is not dressing for spectacle; he is dressing for cold water, impact, and survival.",
        tags: ["Water", "Climate", "Defense"],
        cardBg: "linear-gradient(145deg, #23d9e8, #102235)",
        suitLight: "#fff8e8",
        suitDark: "#23d9e8",
        nodes: [
          { x: "53%", y: "34%", tip: "Sealed neckline: borrows from storm gear and wetsuits, implying constant exposure to water and harsh weather." },
          { x: "42%", y: "55%", tip: "Bright cyan visibility stripe: reads as rescue equipment, not just a flashy superhero accent." },
          { x: "59%", y: "78%", tip: "Heavy lower-leg forms: suggest bracing against waves, wind, and rushing water." }
        ]
      },
      {
        name: "Psionic Surge",
        role: "",
        short: "A neighborhood hero who gets stronger when people around him organize together.",
        origin: "A local organizer hit by an experimental crowd-control device transformed its force into a power that grows whenever people act in solidarity around him.",
        powers: ["Converts collective sound into strength", "Creates shockwave claps and stomp barriers", "Amplifies chants into protective force fields"],
        process: "Block Party is designed around collective action rather than lone savior mythology. His worldbuilding is inspired by block clubs, protests, music in public space, tenant organizing, and the way communities use noise to claim visibility. His clothes lean urban and loose-fitting because the costume should feel assembled from lived-in neighborhood style, not issued by a superhero lab.",
        tags: ["Strength", "Sound", "Community"],
        cardBg: "linear-gradient(145deg, #dca66d, #1b1b1a)",
        suitLight: "#dca66d",
        suitDark: "#102235",
        nodes: [
          { x: "51%", y: "31%", tip: "Cap/hood read: gives him a streetwear silhouette first, keeping the design grounded in local identity." },
          { x: "39%", y: "51%", tip: "Loose outerwear: makes him feel like a person from the neighborhood before he feels like a branded hero." },
          { x: "62%", y: "67%", tip: "Warm orange accents: suggest music, movement, and celebration rather than militarized power." }
        ]
      },
      {
        name: "Granite Jack",
        role: "Transparent-skinned tank / truth enforcer",
        short: "A bruiser hiding behind a skin of rock, and is everyone's best friend.",
        origin: "A whistleblower poisoned by a corporate transparency experiment, Jonathan Kirby was transformed into a mass of living mineral with super strength.",
        powers: ["Grows crystal armor", "Reflects energy through fractured surfaces", "Exposes hidden objects by refracting light around them"],
        process: "Glassjaw starts from a contradiction: a tank character who cannot hide the damage done to him. The worldbuilding draws on corporate secrecy, whistleblower risk, medical experimentation, and the language of transparency used by institutions that are not actually transparent. His costume is minimal and tight because bulky clothing would fight the central visual idea: the body itself is the evidence.",
        tags: ["Crystal", "Tank", "Exposure"],
        cardBg: "linear-gradient(145deg, #fff8e8, #cfcfc9)",
        suitLight: "#cfcfc9",
        suitDark: "#102235",
        nodes: [
          { x: "49%", y: "30%", tip: "Pale glass palette: makes the body feel exposed and fragile, even though he is physically durable." },
          { x: "58%", y: "52%", tip: "Angular torso shapes: imply fracture and refraction instead of standard muscle plating." },
          { x: "41%", y: "70%", tip: "Tight silhouette: keeps attention on the crystalline body rather than accessories or armor." }
        ]
      },
      {
        name: "Shining Knight",
        role: "Solar-powered mythic runner",
        short: "An ageless knight who can store and release energy in shockwaves.",
        origin: "Born from a mythic order who preserved ancient oaths after the gods went silent, the Shining Knight enters modern society with grace, confusion, and a radical belief that humanity can still be better than its history.",
        powers: ["Solar-charged super speed", "Heat-trail afterimages", "Lends stored warmth to people or objects"],
        process: "Borrowed Sun is built from the image of someone carrying warmth through a cold world. The concept pulls from solar infrastructure, gig-work delivery routes, desert heat, and mythic figures who steal fire or daylight for humanity. The costume is aerodynamic but not sterile, mixing runner gear with sun-priest color language so the character feels both practical and legendary.",
        tags: ["Speed", "Solar", "Myth"],
        cardBg: "linear-gradient(145deg, #dca66d, #fff8e8)",
        suitLight: "#fff8e8",
        suitDark: "#dca66d",
        nodes: [
          { x: "50%", y: "27%", tip: "Sunburst framing: gives the speedster a mythic read before any motion effects appear." },
          { x: "44%", y: "53%", tip: "Fitted runner suit: explains speed and heat control without needing heavy armor." },
          { x: "61%", y: "74%", tip: "Bright lower-leg accents: suggest the trail starts at the feet, tying the costume to movement." }
        ]
      }
    ];

    const grid = document.getElementById("catalogGrid");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalInner = document.getElementById("modalInner");
    const modalClose = document.getElementById("modalClose");

    function figureMarkup(hero, includeNodes = false) {
      return `
        <div class="figure" aria-hidden="true">
          <div class="figure__head"></div>
          <div class="figure__arm left"></div>
          <div class="figure__arm right"></div>
          <div class="figure__body"></div>
          <div class="figure__leg left"></div>
          <div class="figure__leg right"></div>
        </div>
        ${includeNodes ? hero.nodes.map(node => `
          <button class="costume-node" style="--x:${node.x}; --y:${node.y};" data-tooltip="${node.tip}" aria-label="Costume note: ${node.tip}"></button>
        `).join("") : ""}
      `;
    }

    function renderCatalog() {
      grid.innerHTML = heroes.map((hero, index) => `
        <article class="hero-card" style="--card-bg:${hero.cardBg}; --suit-light:${hero.suitLight}; --suit-dark:${hero.suitDark};">
          <div class="portrait-panel" tabindex="0" role="button" aria-label="Open details for ${hero.name}" data-index="${index}">
            <div class="placeholder-label">Placeholder</div>
            ${figureMarkup(hero, false)}
          </div>
          <div class="card-caption">
            <h3>${hero.name}</h3>
            <p>${hero.short}</p>
            <div class="tag-row">
              ${hero.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
            </div>
            <button class="open-file" data-index="${index}">Open character file</button>
          </div>
        </article>
      `).join("");
    }

    function openModal(index) {
      const hero = heroes[index];
      modalBackdrop.classList.remove("is-open", "is-closing");
      modalInner.innerHTML = `
        <div class="modal-grid" style="--card-bg:${hero.cardBg}; --suit-light:${hero.suitLight}; --suit-dark:${hero.suitDark};">
          <div class="modal-portrait">
            ${figureMarkup(hero, true)}
          </div>
          <div class="modal-copy">
            <div class="kicker">Character file</div>
            <h2 id="modalTitle">${hero.name}</h2>
            <p class="modal-summary">${hero.short}</p>

            <div class="info-grid">
              <div class="info-card">
                <span>Role</span>
                <strong>${hero.role}</strong>
              </div>
              <div class="info-card">
                <span>Origin</span>
                <strong>${hero.origin}</strong>
              </div>
            </div>

            <div class="section-box">
              <h3>Powers</h3>
              <ul>
                ${hero.powers.map(power => `<li>${power}</li>`).join("")}
              </ul>
            </div>

            <div class="section-box">
              <h3>Creation Thought Process</h3>
              <p>${hero.process}</p>
            </div>

            <div class="modal-note">
              Costume notes are attached to the cyan nodes on the image. Hover over, or keyboard-focus, each node to read the specific design explanation.
            </div>
          </div>
        </div>
      `;

      window.requestAnimationFrame(() => {
        modalBackdrop.classList.add("is-open");
        modalBackdrop.setAttribute("aria-hidden", "false");
        modalClose.focus();
      });
    }

    function closeModal() {
      if (!modalBackdrop.classList.contains("is-open") || modalBackdrop.classList.contains("is-closing")) return;

      modalBackdrop.classList.add("is-closing");
      modalBackdrop.setAttribute("aria-hidden", "true");

      const modal = modalBackdrop.querySelector(".modal");
      const finishClose = () => {
        modalBackdrop.classList.remove("is-open", "is-closing");
        if (modal) modal.removeEventListener("animationend", finishClose);
      };

      if (modal) {
        modal.addEventListener("animationend", finishClose);
      } else {
        window.setTimeout(finishClose, 230);
      }
    }

    document.addEventListener("click", event => {
      const node = event.target.closest(".costume-node");
      const panel = event.target.closest(".portrait-panel");
      const button = event.target.closest(".open-file");

      if (node) return;
      if (panel) openModal(Number(panel.dataset.index));
      if (button) openModal(Number(button.dataset.index));
      if (event.target === modalBackdrop || event.target === modalClose) closeModal();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeModal();

      if ((event.key === "Enter" || event.key === " ") && event.target.classList.contains("portrait-panel")) {
        event.preventDefault();
        openModal(Number(event.target.dataset.index));
      }
    });

    renderCatalog();
  </script>
</body>
</html>
