<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super-Hero Concept Catalog</title>
  <style>
    :root {
      --bg: #1b1b1a;
      --bg-deep: #111211;
      --cream: #fff8e8;
      --paper: #f6efdc;
      --gray: #cfcfc9;
      --navy: #102235;
      --tan: #dca66d;
      --cyan: #23d9e8;
      --ink: #161616;
      --muted: rgba(255,248,232,0.72);
      --line: rgba(255,248,232,0.28);
      --line-strong: rgba(255,248,232,0.52);
      --shadow: 0 26px 70px rgba(0,0,0,0.42);
      --serif: Georgia, "Times New Roman", serif;
      --mono: "Courier New", Courier, monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--cream);
      background:
        radial-gradient(circle at 15% 15%, rgba(255,248,232,0.05), transparent 34rem),
        radial-gradient(circle at 85% 20%, rgba(35,217,232,0.055), transparent 24rem),
        linear-gradient(135deg, var(--bg), var(--bg-deep));
      font-family: var(--sans);
    }

    .catalog-shell {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 34px 0 90px;
      position: relative;
    }

    .catalog-shell::before,
    .catalog-shell::after {
      content: "";
      position: fixed;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(35,217,232,0.25);
      pointer-events: none;
      z-index: 0;
    }

    .catalog-shell::before {
      right: 5vw;
      top: 72px;
    }

    .catalog-shell::after {
      right: 43vw;
      top: 40vh;
      transform: rotate(4deg);
    }

    .catalog-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
      gap: 58px;
      align-items: center;
      min-height: 560px;
      position: relative;
      z-index: 1;
    }

    .kicker {
      color: var(--tan);
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      margin-bottom: 26px;
    }

    .catalog-title {
      font-family: var(--serif);
      font-weight: 400;
      line-height: 0.93;
      letter-spacing: -0.055em;
      font-size: clamp(4.1rem, 9.4vw, 8.9rem);
      margin: 0;
      max-width: 680px;
    }

    .catalog-title--compact {
      font-size: clamp(3.4rem, 7vw, 6.4rem);
      margin-top: 10px;
    }

    .catalog-title .cyan {
      color: var(--cyan);
      display: block;
    }

    .catalog-copy {
      width: min(430px, 100%);
      margin: 32px 0 34px;
      color: rgba(255,248,232,0.82);
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.72;
    }

    .outline-button {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      width: min(530px, 100%);
      border: 1px solid rgba(255,248,232,0.45);
      background: transparent;
      color: var(--cream);
      padding: 18px 24px;
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .outline-button:hover,
    .outline-button:focus-visible {
      color: var(--cyan);
      border-color: var(--cyan);
      transform: translateY(-1px);
      outline: none;
    }

    .palette-stack {
      width: min(420px, 100%);
      margin-left: auto;
      transform: rotate(-4deg);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .swatch {
      min-height: 126px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.26);
    }

    .swatch.gray { background: linear-gradient(145deg, #e2e2df, #bdbdb8); }
    .swatch.navy { background: linear-gradient(145deg, #18334d, #0b1725); }
    .swatch.tan { background: linear-gradient(145deg, #efc18d, #cf8f55); }
    .swatch.cyan { background: linear-gradient(145deg, #4ceeff, #12ccd7); }

    .year-card {
      grid-column: 1 / -1;
      min-height: 134px;
      background: radial-gradient(circle at 50% 50%, #fffdf5, var(--paper));
      color: var(--ink);
      display: grid;
      place-items: center;
      font-family: var(--serif);
      letter-spacing: 0.34em;
      font-size: 1rem;
      box-shadow: 0 24px 48px rgba(0,0,0,0.3);
      margin-top: 8px;
    }

    .section-intro {
      display: flex;
      justify-content: space-between;
      gap: 32px;
      align-items: end;
      border-top: 1px solid rgba(255,248,232,0.22);
      padding-top: 28px;
      margin: 0 0 34px;
      position: relative;
      z-index: 1;
    }

    .section-intro h2 {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 5vw, 4.9rem);
      line-height: 0.95;
      font-weight: 400;
      letter-spacing: -0.055em;
      margin: 0;
    }

    .section-intro p {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.65;
      margin: 0;
      max-width: 430px;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 26px;
      position: relative;
      z-index: 1;
    }

    .hero-card {
      border-top: 1px solid rgba(255,248,232,0.35);
      padding-top: 16px;
    }

    .hero-card:nth-child(even) .portrait-panel { transform: rotate(2deg); }
    .hero-card:nth-child(odd) .portrait-panel { transform: rotate(-2deg); }
    .hero-card:nth-child(3n) .portrait-panel { transform: rotate(1deg); }

    .portrait-panel {
      position: relative;
      min-height: 350px;
      cursor: pointer;
      overflow: visible;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      transition: transform 190ms ease, filter 190ms ease;
    }

    .portrait-panel:hover {
      filter: brightness(1.035);
    }

    .portrait-panel:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 6px;
    }

    .portrait-panel::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,0.22);
      pointer-events: none;
      z-index: 2;
    }

    .placeholder-label {
      position: absolute;
      left: 20px;
      top: 20px;
      z-index: 3;
      color: rgba(255,248,232,0.82);
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,248,232,0.26);
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.19em;
      text-transform: uppercase;
    }

    .character-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      z-index: 1;
    }

    .image-empty-state {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: rgba(255,248,232,0.82);
      background:
        linear-gradient(145deg, rgba(255,248,232,0.08), rgba(35,217,232,0.08)),
        var(--card-bg);
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      line-height: 1.5;
      text-transform: uppercase;
      z-index: 1;
    }

    .image-empty-state code {
      display: block;
      margin-top: 10px;
      color: var(--cyan);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      white-space: normal;
    }

    .costume-node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 8;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid var(--cream);
      background: var(--cyan);
      box-shadow: 0 0 0 7px rgba(35,217,232,0.18), 0 12px 26px rgba(0,0,0,0.42);
      cursor: help;
    }

    .costume-node::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
    }

    .costume-node::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 16px);
      width: min(250px, 70vw);
      transform: translateX(-50%) translateY(6px);
      padding: 13px 14px;
      color: var(--ink);
      background: var(--cream);
      border: 1px solid rgba(0,0,0,0.2);
      box-shadow: 0 18px 34px rgba(0,0,0,0.34);
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.48;
      letter-spacing: 0.02em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 170ms ease, transform 170ms ease;
    }

    .costume-node:hover::after,
    .costume-node:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .costume-node:focus-visible {
      outline: 2px solid var(--cream);
      outline-offset: 5px;
    }

    .card-caption {
      padding: 20px 0 0;
    }

    .card-caption h3 {
      margin: 0;
      color: var(--cream);
      font-family: var(--serif);
      font-size: 2.15rem;
      line-height: 1;
      font-weight: 400;
      letter-spacing: -0.045em;
    }

    .card-caption p {
      margin: 10px 0 16px;
      color: rgba(255,248,232,0.72);
      font-family: var(--mono);
      font-size: 0.77rem;
      line-height: 1.65;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      border: 1px solid rgba(255,248,232,0.32);
      color: rgba(255,248,232,0.86);
      padding: 6px 9px;
      font-family: var(--mono);
      font-size: 0.63rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .open-file {
      width: 100%;
      border: 1px solid rgba(255,248,232,0.45);
      background: transparent;
      color: var(--cream);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 13px 14px;
      cursor: pointer;
      transition: color 180ms ease, border-color 180ms ease;
    }

    .open-file:hover,
    .open-file:focus-visible {
      color: var(--cyan);
      border-color: var(--cyan);
      outline: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 26px;
      background: rgba(10,10,10,0.78);
      backdrop-filter: blur(9px);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 210ms ease, visibility 0s linear 210ms;
    }

    .modal-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transition: none;
    }

    .modal-backdrop.is-closing {
      opacity: 1;
      pointer-events: none;
      visibility: visible;
      transition: none;
    }

    .modal {
      width: min(970px, 100%);
      max-height: min(88vh, 900px);
      overflow: auto;
      background: var(--cream);
      color: var(--ink);
      box-shadow: 0 36px 90px rgba(0,0,0,0.58);
      transform: rotate(-1deg) scale(0.72);
      border: 1px solid rgba(255,248,232,0.5);
      opacity: 1;
      transform-origin: center center;
    }

    .modal-backdrop.is-open:not(.is-closing) .modal {
      animation: modalExpand 230ms cubic-bezier(.2,.9,.2,1.15) forwards;
    }

    @keyframes modalExpand {
      from {
        opacity: 1;
        transform: rotate(-1deg) scale(0.72);
      }
      to {
        opacity: 1;
        transform: rotate(-1deg) scale(1);
      }
    }

    @keyframes modalCollapse {
      from {
        opacity: 1;
        transform: rotate(-1deg) scale(1);
      }
      to {
        opacity: 1;
        transform: rotate(-1deg) scale(0.72);
      }
    }

    .modal-backdrop.is-closing .modal {
      animation: modalCollapse 230ms cubic-bezier(.8,-.15,.8,.1) forwards;
    }

    .modal-close {
      position: sticky;
      top: 14px;
      float: right;
      z-index: 3;
      margin: 14px 14px 0 0;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(0,0,0,0.25);
      background: rgba(255,248,232,0.76);
      color: var(--ink);
      font-size: 1.45rem;
      cursor: pointer;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 28px;
      padding: 34px;
      clear: both;
    }

    .modal-portrait {
      position: relative;
      min-height: 420px;
      background: var(--card-bg);
      box-shadow: 0 22px 42px rgba(0,0,0,0.22);
    }

    .modal-portrait::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,0.24);
      pointer-events: none;
      z-index: 2;
    }

    .modal-portrait .costume-node::after {
      z-index: 12;
    }

    .modal-portrait .character-image.image-focus-right {
      object-position: top right;
    }

    .modal-copy .kicker {
      color: #9a6c3e;
      margin-bottom: 18px;
    }

    .modal-copy h2 {
      font-family: var(--serif);
      font-size: clamp(3.6rem, 7vw, 6.2rem);
      line-height: 0.88;
      font-weight: 400;
      letter-spacing: -0.065em;
      margin: 0 0 20px;
      color: var(--ink);
    }

    .modal-summary {
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.7;
      color: rgba(0,0,0,0.72);
      max-width: 590px;
      margin: 0 0 22px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 0 0 18px;
    }

    .info-card {
      border: 1px solid rgba(0,0,0,0.18);
      padding: 14px;
      background: rgba(255,255,255,0.4);
    }

    .info-card span,
    .section-box h3 {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: #9a6c3e;
      margin-bottom: 8px;
    }

    .info-card strong {
      font-size: 0.91rem;
      line-height: 1.42;
    }

    .section-box {
      border-top: 1px solid rgba(0,0,0,0.18);
      padding-top: 16px;
      margin-top: 18px;
    }

    .section-box p,
    .section-box li {
      font-family: var(--mono);
      font-size: 0.84rem;
      line-height: 1.72;
      color: rgba(0,0,0,0.76);
    }

    .section-box p { margin: 0; }
    .section-box ul { margin: 0; padding-left: 1.15rem; }

    .modal-note {
      margin-top: 18px;
      border: 1px solid rgba(35,217,232,0.5);
      color: rgba(0,0,0,0.72);
      padding: 12px 13px;
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .catalog-hero,
      .modal-grid {
        grid-template-columns: 1fr;
      }

      .palette-stack {
        margin: 12px 0 0;
      }

      .catalog-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .catalog-shell {
        width: min(100% - 22px, 1180px);
        padding-top: 36px;
      }

      .catalog-hero {
        min-height: unset;
        gap: 40px;
      }

      .catalog-grid,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .section-intro {
        display: block;
      }

      .section-intro p {
        margin-top: 18px;
      }

      .palette-stack {
        gap: 10px;
      }

      .swatch { min-height: 100px; }
      .year-card { min-height: 108px; }
      .portrait-panel { min-height: 320px; }

      .modal-backdrop { padding: 10px; }
      .modal { transform: none; }
      .modal-grid { padding: 22px; }
      .modal-portrait { min-height: 340px; }
    }
  </style>
</head>
<body>
  <main class="catalog-shell">
    <section class="section-intro" id="selected-work">
      <div>
        <div class="kicker">Character design archive — six concepts</div>
        <h1 class="catalog-title catalog-title--compact">Super-Hero <span class="cyan">Concepts</span></h1>
      </div>
      <p>Click an image panel to open that character’s file. Paste each character image link into the image field in the script. Costume notes appear as hoverable nodes only inside the expanded character window.</p>
    </section>

    <section class="catalog-grid" id="catalogGrid" aria-label="Superhero character catalog"></section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <article class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close character details">×</button>
      <div id="modalInner"></div>
    </article>
  </div>

  <script>
    const heroes = [
      {
        name: "Ghost Radar",
        role: "Urban rescuer / Street-Level tactician",
        short: "A dark brooding hero who turns city infrastructure into a living rescue network.",
        image: "GhostRadar.png",
        imageAlt: "Portrait art of Ghost Radar",
        modalImageFocus: "right",
        origin: "Olga Alekseev was born with exceptional perceptual senses and incredibly sensitive hearing. She ran a family circus in Moscow, Russia, but the circus was constantly looted by the mafia. Then a mafia-caused blackout accident that gave her powers and killed her family. Fueled by revenge, she took on the persona of the Ghost Radar, using her keen senses to locate crimes around the city and fight criminals with her excellent martial arts training. Over time as she continues to wage war against crime, she learns that vengeance is not the answer, but to instead be a symbol of protection and hope for the city.",
        powers: ["Superhuman Senses", "Enhanced Hearing", "Enhanced Touch & Smell", "Can detect electrical signals and noise", "Hand-to-Hand Combat", "Escrima Stick Combat",],
        process: "Unlike most of my heroes, I wanted a character fueled with a different motivation initially. Someone who begins their journey with a sinister mission, but learns the hero’s journey on their own. This could inspire readers that brutality, violence, and authoritative fear is not an effective goal to achieving true justice in the world.",
        tags: ["Electric", "Brooding", "Rescue"],
        cardBg: "linear-gradient(145deg, #cfcfc9, #102235)",
        suitLight: "#23d9e8",
        suitDark: "#102235",
        nodes: [
          { x: "50%", y: "26%", tip: "Halo-like collar: frames her head as a rescue beacon, connecting emergency lights with saint imagery." },
          { x: "43%", y: "52%", tip: "Circuit-like suit lines: shows that she is plugged into the city without turning her into generic tech armor." },
          { x: "61%", y: "73%", tip: "Reinforced boots: points toward utility work, rooftops, and field rescue instead of clean superhero pageantry." }
        ]
      },
      {
        name: "The Switch",
        role: "Night patrol illusionist",
        short: "A quiet hero who weaponizes glare, shadow, and misdirection.",
        image: "Switch.png",
        imageAlt: "Portrait art of The Switch",
        origin: "Erik grew up in Antarctica and his father was a glaciologist, but suddenly his father goes missing during an expedition. Feeling alone and full of despair he went far into the glaciers and the artic snow and deep inside the ice, he discovered something impossible. A massive, pulsing crystal formation older than humanity itself, a fragment of something that fell from space millions of years ago. Erik goes to touch the crystal, and the crystal fused into him, restructuring his body at the molecular level. Light bends around him, through him, because of him. From then, he decides to help others as a way of finding his father, in the hope he can finally save his father.",
        powers: ["Photokinesis - Bending light", "Refraction of Light through Crystalline Shapeshifting", "Flash-disorients enemies for brief windows"],
        process: "Switch came about because ultimately, not every hero is a character built for this life. They struggle with it so much that it hurts their finances, their job prospects, even their personal relationships. Switch wishes he wasn’t burdened with the responsibility of the crystal, but he accepts it anyway. He is the right man for the wrong job, and he doesn’t care. Switch is a symbol of change and intervention. We need to change the way we think about helping others, and go into action if we see someone who is struggling.",
        tags: ["Illusion", "Stealth", "Responsibility"],
        cardBg: "linear-gradient(145deg, #102235, #1b1b1a)",
        suitLight: "#cfcfc9",
        suitDark: "#102235",
        nodes: [
          { x: "50%", y: "25%", tip: "Hooded silhouette: creates a moth-wing shape around the face, making the figure feel hidden even in full view." },
          { x: "36%", y: "49%", tip: "Loose panels: behave like stage curtains, turning reveal and concealment into part of the costume." },
          { x: "63%", y: "58%", tip: "Muted navy-gray palette: keeps the design nocturnal without relying on plain black stealth clichés." }
        ]
      },
      {
        name: "Helix-3",
        role: "Armored Android, Powerhouse in all 10 of its servos",
        short: "Android Powerhouse with a flare for the self-aware, protects coastal city",
        image: "Helix-3.png",
        imageAlt: "Portrait art of Helix-3",
        origin: "A company created a robot protector called Helix. It was built with 10 powerful servos that gave him incredible strength and speed. During a giant lighting storm, energy struck the lab and accidentally gave Helix-3 self awareness.The company became afraid of him and wanted to destroy him. But Helix-3 escaped and saw innocent people suffering in the city. Instead of becoming a weapon, he decided to protect the people and become a hero.",
        powers: ["Super Strength", "Enhanced Chasis Durability", "Capable of Flight, Speed, and Space Travel",],
        process: "I wondered “what if a robot became powerful enough to think for itself?’ The name “Helix” came from DNA and evolution, because the robot was evolving beyond normal programming. The “3” meant it was the third and strongest version ever created. I wanted Helix-3 to feel cool and powerful, but also emotional - like a machine trying to figure out who it really is, and it finds solidarity in its fellow heroes when it meets them. They prove to him that even an Android can cry.",
        tags: ["Robot", "Sentience", "Defense"],
        cardBg: "linear-gradient(145deg, #23d9e8, #102235)",
        suitLight: "#fff8e8",
        suitDark: "#23d9e8",
        nodes: [
          { x: "53%", y: "34%", tip: "Sealed neckline: borrows from storm gear and wetsuits, implying constant exposure to water and harsh weather." },
          { x: "42%", y: "55%", tip: "Bright cyan visibility stripe: reads as rescue equipment, not just a flashy superhero accent." },
          { x: "59%", y: "78%", tip: "Heavy lower-leg forms: suggest bracing against waves, wind, and rushing water." }
        ]
      },
      {
        name: "Psionic Surge",
        role: "Telepath Spy, Gray Femme Fatale",
        short: "A distrustful and untrustworthy confidant, but one always geared to doing what's right",
        image: "PsionicSurge.png",
        imageAlt: "Portrait art of Psionic Surge",
        origin: "The head of an interpol-like spy organization, Director Gretchen Goode, nicknamed 'Psionic Surge' is closely monitoring the advent of costumed crusaders calling themselves 'Super-Heroes'. She was born with her powers, a rarity in this world.",
        powers: ["Telepathy and Mind Control", "Psychic Warfare", "Psychic Force Field Generation,"],
        process: "Psionic Surge is a reaction to how much I've seen seats of power fall into the same motions of ignoring and only taking note of something radical happening. Goode is someone that saw horrors like the Library Riots of '87, or the Satanic Panic that stretched as far into the late 90s, and could only blink as her superiors told her to take their side. She sees the super-heroes as a breath of fresh air—if extremely risky.",
        tags: ["Spy", "Mind", "Government"],
        cardBg: "linear-gradient(145deg, #dca66d, #1b1b1a)",
        suitLight: "#dca66d",
        suitDark: "#102235",
        nodes: [
          { x: "51%", y: "31%", tip: "Cap/hood read: gives him a streetwear silhouette first, keeping the design grounded in local identity." },
          { x: "39%", y: "51%", tip: "Loose outerwear: makes him feel like a person from the neighborhood before he feels like a branded hero." },
          { x: "62%", y: "67%", tip: "Warm orange accents: suggest music, movement, and celebration rather than militarized power." }
        ]
      },
      {
        name: "Granite Jack",
        role: "Transparent-skinned Tank",
        short: "A bruiser hiding behind a skin of Crystal, everyone's best friend.",
        image: "GraniteJack.png",
        imageAlt: "Portrait art of Granite Jack",
        origin: "A whistleblower poisoned by a corporate transparency experiment, Jonathan Kirby was transformed into a mass of living mineral with super strength.",
        powers: ["Grows crystal armor", "Reflects energy through fractured surfaces", "Can carry over 100 tons on his one hand alone"],
        process: "Granite Jack starts from a contradiction: the huggable bruiser who looks monstrous, jokes through pain, and cares about everybody more than he admits. His body is the tragedy, but his personality is the reason that he holds together, especially on a team. Once he teams up with the other heroes, this guy is nigh unstoppable, more so than he would be alone.",
        tags: ["Crystal", "Tank", "Exposure"],
        cardBg: "linear-gradient(145deg, #fff8e8, #cfcfc9)",
        suitLight: "#cfcfc9",
        suitDark: "#102235",
        nodes: [
          { x: "49%", y: "30%", tip: "Pale glass palette: makes the body feel exposed and fragile, even though he is physically durable." },
          { x: "58%", y: "52%", tip: "Angular torso shapes: imply fracture and refraction instead of standard muscle plating." },
          { x: "41%", y: "70%", tip: "Tight silhouette: keeps attention on the crystalline body rather than accessories or armor." }
        ]
      },
      {
        name: "Shining Knight",
        role: "Ageless Warrior in Present Day",
        short: "An Arthurian Knight who can store and release energy in shockwaves.",
        image: "ShiningKnight.png",
        imageAlt: "Portrait art of Shining Knight",
        modalImageFocus: "right",
        origin: "Born from a mythic order who preserved ancient oaths after the gods went silent, the Shining Knight enters modern society with grace, confusion, and a radical belief that humanity can still be better than its history.",
        powers: ["Solar-charged super speed", "Heat-blasts from palms"],
        process: "When creating Shining Knight, I was calling on a lot of my fascination with mythology, but one retrofitted to modern styles. I thought it would be interesting if instead of being draped in old Greek fashion, her suit would be a healthy mix of modern military wear and medieval iconography.",
        tags: ["Warrior", "Knight", "Myth"],
        cardBg: "linear-gradient(145deg, #dca66d, #fff8e8)",
        suitLight: "#fff8e8",
        suitDark: "#dca66d",
        nodes: [
          { x: "50%", y: "27%", tip: "Sunburst framing: gives the speedster a mythic read before any motion effects appear." },
          { x: "44%", y: "53%", tip: "Fitted runner suit: explains speed and heat control without needing heavy armor." },
          { x: "61%", y: "74%", tip: "Bright lower-leg accents: suggest the trail starts at the feet, tying the costume to movement." }
        ]
      }
    ];

    const grid = document.getElementById("catalogGrid");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalInner = document.getElementById("modalInner");
    const modalClose = document.getElementById("modalClose");

    function imageMarkup(hero, includeNodes = false) {
      const hasImage = hero.image && hero.image.trim() && hero.image !== "PASTE_IMAGE_LINK_HERE";
      const safeAlt = hero.imageAlt || `${hero.name} character portrait`;

      const focusClass = includeNodes && hero.modalImageFocus === "right" ? " image-focus-right" : "";

      return `
        ${hasImage
          ? `<img class="character-image${focusClass}" src="${hero.image}" alt="${safeAlt}" loading="lazy">`
          : `<div class="image-empty-state">Image slot<code>Paste link into hero.image</code></div>`
        }

        ${includeNodes ? hero.nodes.map(node => `
          <button class="costume-node" style="--x:${node.x}; --y:${node.y};" data-tooltip="${node.tip}" aria-label="Costume note: ${node.tip}"></button>
        `).join("") : ""}
      `;
    }

    function renderCatalog() {
      grid.innerHTML = heroes.map((hero, index) => `
        <article class="hero-card" style="--card-bg:${hero.cardBg}; --suit-light:${hero.suitLight}; --suit-dark:${hero.suitDark};">
          <div class="portrait-panel" tabindex="0" role="button" aria-label="Open details for ${hero.name}" data-index="${index}">
            ${imageMarkup(hero, false)}
          </div>
          <div class="card-caption">
            <h3>${hero.name}</h3>
            <p>${hero.short}</p>
            <div class="tag-row">
              ${hero.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
            </div>
            <button class="open-file" data-index="${index}">Open character file</button>
          </div>
        </article>
      `).join("");
    }

    function openModal(index) {
      const hero = heroes[index];
      modalBackdrop.classList.remove("is-open", "is-closing");
      modalInner.innerHTML = `
        <div class="modal-grid" style="--card-bg:${hero.cardBg}; --suit-light:${hero.suitLight}; --suit-dark:${hero.suitDark};">
          <div class="modal-portrait">
            ${imageMarkup(hero, true)}
          </div>
          <div class="modal-copy">
            <div class="kicker">Character file</div>
            <h2 id="modalTitle">${hero.name}</h2>
            <p class="modal-summary">${hero.short}</p>

            <div class="info-grid">
              <div class="info-card">
                <span>Role</span>
                <strong>${hero.role}</strong>
              </div>
              <div class="info-card">
                <span>Origin</span>
                <strong>${hero.origin}</strong>
              </div>
            </div>

            <div class="section-box">
              <h3>Powers</h3>
              <ul>
                ${hero.powers.map(power => `<li>${power}</li>`).join("")}
              </ul>
            </div>

            <div class="section-box">
              <h3>Creation Thought Process</h3>
              <p>${hero.process}</p>
            </div>

            <div class="modal-note">
              Costume notes are attached to the cyan nodes on the image. Hover over, or keyboard-focus, each node to read the specific design explanation. To change the art, paste a direct image URL into that character’s image field.
            </div>
          </div>
        </div>
      `;

      window.requestAnimationFrame(() => {
        modalBackdrop.classList.add("is-open");
        modalBackdrop.setAttribute("aria-hidden", "false");
        modalClose.focus();
      });
    }

    function closeModal() {
      if (!modalBackdrop.classList.contains("is-open") || modalBackdrop.classList.contains("is-closing")) return;

      modalBackdrop.classList.add("is-closing");
      modalBackdrop.setAttribute("aria-hidden", "true");

      const modal = modalBackdrop.querySelector(".modal");
      const finishClose = () => {
        modalBackdrop.classList.remove("is-open", "is-closing");
        if (modal) modal.removeEventListener("animationend", finishClose);
      };

      if (modal) {
        modal.addEventListener("animationend", finishClose);
      } else {
        window.setTimeout(finishClose, 230);
      }
    }

    document.addEventListener("click", event => {
      const node = event.target.closest(".costume-node");
      const panel = event.target.closest(".portrait-panel");
      const button = event.target.closest(".open-file");

      if (node) return;
      if (panel) openModal(Number(panel.dataset.index));
      if (button) openModal(Number(button.dataset.index));
      if (event.target === modalBackdrop || event.target === modalClose) closeModal();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeModal();

      if ((event.key === "Enter" || event.key === " ") && event.target.classList.contains("portrait-panel")) {
        event.preventDefault();
        openModal(Number(event.target.dataset.index));
      }
    });

    renderCatalog();
  </script>
</body>
</html>
